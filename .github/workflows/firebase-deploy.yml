name: Deploy to Firebase App Distribution

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create App Distribution credentials file
        env:
          CREDENTIAL_FILE_CONTENT: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
        run: |
          python3 -c "import os; open('firebase-credentials.json','w').write(os.environ['CREDENTIAL_FILE_CONTENT'])"

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          python3 -c "import os; open('composeApp/google-services.json','w').write(os.environ['GOOGLE_SERVICES_JSON'])"

      - name: Validate google-services.json
        run: python3 -c "import json; json.load(open('composeApp/google-services.json')); print('google-services.json is valid')"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and Upload to Firebase App Distribution
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: firebase-credentials.json
        run: >
          ./gradlew :composeApp:assembleRelease :composeApp:appDistributionUploadRelease
          -x :composeApp:sentryUploadSourceBundleRelease
          -x :composeApp:generateSentryBundleIdRelease
